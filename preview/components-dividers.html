<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Dividers</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-stage); background-image: var(--stage-pattern); padding: 24px; min-height: 100vh; box-sizing: border-box; }
  .card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 20px 22px; box-shadow: var(--elev-1); }
  .label { font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.04em; }
  .row { display:flex; align-items:center; gap:10px; }
</style>
</head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:14px;">Dividers · solid & dashed</div>
  <div style="display:flex; flex-direction:column; gap:20px;">
    <div>
      <div class="meta" style="text-transform:none; letter-spacing:0; margin-bottom:8px;">solid hairline (rows)</div>
      <div style="height:1px; background:var(--border);"></div>
    </div>
    <div>
      <div class="meta" style="text-transform:none; letter-spacing:0; margin-bottom:8px;">dashed (inside card · zone separator)</div>
      <div style="border-top:1px dashed var(--border-dashed); height:0;"></div>
    </div>
    <div class="row" style="gap:6px;">
      <span class="meta" style="text-transform:none; letter-spacing:0;">inline pipe & slash</span>
      <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; color:var(--fg-3);">/</span>
      <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; color:var(--fg-3);">|</span>
      <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; color:var(--fg-3);">·</span>
    </div>
  </div>
</div>

<script>lucide && lucide.createIcons && lucide.createIcons();</script>
</body>
</html>

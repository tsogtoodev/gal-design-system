<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Breadcrumb</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-stage); background-image: var(--stage-pattern); padding: 24px; min-height: 100vh; box-sizing: border-box; }
  .card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 20px 22px; box-shadow: var(--elev-1); }
  .label { font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.04em; }
  .row { display:flex; align-items:center; gap:10px; }
</style>
</head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:14px;">Mono breadcrumb · workflow header</div>
  <div class="row" style="gap:10px;">
    <i data-lucide="chevron-left" style="width:16px; height:16px; color:var(--fg-3);"></i>
    <i data-lucide="git-branch" style="width:14px; height:14px; color:var(--fg-3);"></i>
    <div style="font-family:var(--font-mono); font-size:11px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--fg-3);">WORKFLOWS</div>
    <div style="font-family:var(--font-mono); font-size:11px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--fg-3);">/</div>
    <div style="font-family:var(--font-mono); font-size:11px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--fg-1);">NEW USER MARKETING SIGNUP</div>
    <i data-lucide="star" style="width:14px; height:14px; color:var(--fg-3); margin-left:4px;"></i>
  </div>
</div>

<script>lucide && lucide.createIcons && lucide.createIcons();</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html,body{margin:0;padding:0}
  body{background:var(--bg-stage);background-image:var(--stage-pattern);padding:20px;min-height:100vh;box-sizing:border-box}
  .frame{background:var(--bg-surface-2);border:1px solid var(--border);border-radius:16px;box-shadow:var(--elev-1);padding:6px;display:flex;flex-direction:column;gap:6px;}
  .fh{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 4px;gap:10px;}
  .fh .t{font:600 14px/1.2 var(--font-sans);color:var(--fg-1);}
  .ibtn{width:24px;height:24px;border:0;background:transparent;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--fg-2);transition:background 140ms,color 140ms;}
  .ibtn:hover{background:rgba(15,15,15,0.05);color:var(--fg-1);}
  .ibtn svg{width:14px;height:14px;}
  .sub{background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:14px;}
  .ml{font-family:var(--font-mono);font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--fg-3);}
  .ff{display:flex;align-items:center;gap:10px;padding:8px 10px 8px;}
  .ff .meta{font-family:var(--font-mono);font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--fg-3);white-space:nowrap;}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:999px;font:500 12px/1 var(--font-sans);cursor:pointer;border:1px solid transparent;transition:background 140ms;white-space:nowrap;}
  .btn-outline{background:var(--bg-surface);color:var(--fg-1);border-color:var(--border-strong);}
  .btn-outline:hover{background:var(--bg-surface-2);}
  .btn-primary{background:var(--accent);color:white;}
  .btn-primary:hover{background:var(--accent-hover);}
  .btn-ghost{background:transparent;color:var(--fg-2);}
  .btn svg{width:12px;height:12px;flex-shrink:0;}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-family:var(--font-mono);font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;white-space:nowrap;}
  .pill::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}
  .pill.success{background:var(--success-soft);color:var(--success);}
  .pill.info{background:var(--info-soft);color:var(--info);}
  .pill.warn{background:var(--warning-soft);color:var(--warning);}
  .pill.danger{background:var(--danger-soft);color:var(--danger);}
  .pill.neutral{background:var(--bg-surface-2);color:var(--fg-2);border:1px solid var(--border);}
  .pill.neutral::before{display:none;}
</style>
</head>
<body>
<div class="frame">
  <div class="fh">
    <span class="t">Chart</span>
    <span style="margin-left:auto;display:inline-flex;gap:6px;align-items:center;color:var(--fg-3);font-size:11px;">
      <i data-lucide="sparkles" style="width:11px;height:11px;color:var(--accent);"></i> Generated from your data
    </span>
  </div>
  <div class="sub" style="padding:0;">
    <div style="padding:14px 16px 6px;display:flex;align-items:center;gap:10px;">
      <h3 style="margin:0;font:600 14px/1.2 var(--font-sans);">Deploy duration · last 7 days</h3>
      <span style="flex:1;"></span>
      <span class="pill success">−18% wow</span>
    </div>
    <div style="padding:0 16px 12px;">
      <svg width="100%" height="160" viewBox="0 0 480 160" preserveAspectRatio="none">
        <defs>
          <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#F5642B" stop-opacity="0.28"/>
            <stop offset="100%" stop-color="#F5642B" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <line x1="40" y1="130" x2="470" y2="130" stroke="var(--border)"/>
        <line x1="40" y1="90"  x2="470" y2="90"  stroke="var(--border)" stroke-dasharray="2 4"/>
        <line x1="40" y1="50"  x2="470" y2="50"  stroke="var(--border)" stroke-dasharray="2 4"/>
        <text x="32" y="134" font-family="Geist Mono, JetBrains Mono" font-size="10" fill="#9A9AA1" text-anchor="end">0</text>
        <text x="32" y="94"  font-family="Geist Mono, JetBrains Mono" font-size="10" fill="#9A9AA1" text-anchor="end">5</text>
        <text x="32" y="54"  font-family="Geist Mono, JetBrains Mono" font-size="10" fill="#9A9AA1" text-anchor="end">10m</text>
        <!-- area -->
        <path d="M60,110 Q120,80 180,90 T300,70 T420,40 L420,130 L60,130 Z" fill="url(#cg)"/>
        <!-- line -->
        <path d="M60,110 Q120,80 180,90 T300,70 T420,40" stroke="#F5642B" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- points -->
        <circle cx="60" cy="110" r="3" fill="#F5642B" stroke="white" stroke-width="1.5"/><circle cx="120" cy="80" r="3" fill="#F5642B" stroke="white" stroke-width="1.5"/><circle cx="180" cy="90" r="3" fill="#F5642B" stroke="white" stroke-width="1.5"/><circle cx="240" cy="72" r="3" fill="#F5642B" stroke="white" stroke-width="1.5"/><circle cx="300" cy="70" r="3" fill="#F5642B" stroke="white" stroke-width="1.5"/><circle cx="360" cy="52" r="3" fill="#F5642B" stroke="white" stroke-width="1.5"/><circle cx="420" cy="40" r="3" fill="#F5642B" stroke="white" stroke-width="1.5"/>
        <!-- x-labels -->
        <text x="60" y="150" font-family="Geist Mono, JetBrains Mono" font-size="10" fill="#9A9AA1" text-anchor="middle" letter-spacing="0.06em">MON</text><text x="120" y="150" font-family="Geist Mono, JetBrains Mono" font-size="10" fill="#9A9AA1" text-anchor="middle" letter-spacing="0.06em">TUE</text><text x="180" y="150" font-family="Geist Mono, JetBrains Mono" font-size="10" fill="#9A9AA1" text-anchor="middle" letter-spacing="0.06em">WED</text><text x="240" y="150" font-family="Geist Mono, JetBrains Mono" font-size="10" fill="#9A9AA1" text-anchor="middle" letter-spacing="0.06em">THU</text><text x="300" y="150" font-family="Geist Mono, JetBrains Mono" font-size="10" fill="#9A9AA1" text-anchor="middle" letter-spacing="0.06em">FRI</text><text x="360" y="150" font-family="Geist Mono, JetBrains Mono" font-size="10" fill="#9A9AA1" text-anchor="middle" letter-spacing="0.06em">SAT</text><text x="420" y="150" font-family="Geist Mono, JetBrains Mono" font-size="10" fill="#9A9AA1" text-anchor="middle" letter-spacing="0.06em">SUN</text>
      </svg>
    </div>
  </div>
  <div class="ff"><span class="meta">7 POINTS · GENERATED BY TOOL</span></div>
</div>
<script>if(window.lucide)lucide.createIcons();</script></body></html>

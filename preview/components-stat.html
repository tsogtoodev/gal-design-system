<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Stat + sparkline</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-stage); background-image: var(--stage-pattern); padding: 24px; min-height: 100vh; box-sizing: border-box; }
  .card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 20px 22px; box-shadow: var(--elev-1); }
  .label { font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.04em; }
  .row { display:flex; align-items:center; gap:10px; }
</style>
</head>
<body>
<div class="card" style="padding:0;">
  <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:0;">
    
    <div style="padding:16px 18px; border-right:1px solid var(--border);">
      <div style="display:flex; align-items:center; gap:8px; color:var(--fg-3); margin-bottom:8px;">
        <i data-lucide="users" style="width:14px; height:14px;"></i>
        <span style="font-size:12px; color:var(--fg-2);">Total Uses</span>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:flex-end;">
        <div style="font:600 22px/1 var(--font-sans); font-variant-numeric:tabular-nums;">1,200</div>
        <svg width="80" height="28" viewBox="0 0 80 28" fill="none">
          <path d="M0 18 L10 16 L20 22 L30 8 L40 12 L50 4 L60 14 L70 6 L80 10" stroke="#16A34A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
    </div>
    <div style="padding:16px 18px; border-right:1px solid var(--border);">
      <div style="display:flex; align-items:center; gap:8px; color:var(--fg-3); margin-bottom:8px;">
        <i data-lucide="user" style="width:14px; height:14px;"></i>
        <span style="font-size:12px; color:var(--fg-2);">Unique Users</span>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:flex-end;">
        <div style="font:600 22px/1 var(--font-sans); font-variant-numeric:tabular-nums;">320</div>
        <svg width="80" height="28" viewBox="0 0 80 28" fill="none">
          <path d="M0 18 L10 16 L20 22 L30 8 L40 12 L50 4 L60 14 L70 6 L80 10" stroke="#F5642B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
    </div>
    <div style="padding:16px 18px; ">
      <div style="display:flex; align-items:center; gap:8px; color:var(--fg-3); margin-bottom:8px;">
        <i data-lucide="calendar" style="width:14px; height:14px;"></i>
        <span style="font-size:12px; color:var(--fg-2);">Daily Uses</span>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:flex-end;">
        <div style="font:600 22px/1 var(--font-sans); font-variant-numeric:tabular-nums;">120</div>
        <svg width="80" height="28" viewBox="0 0 80 28" fill="none">
          <path d="M0 18 L10 16 L20 22 L30 8 L40 12 L50 4 L60 14 L70 6 L80 10" stroke="#16A34A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
    </div>
  </div>
</div>

<script>lucide && lucide.createIcons && lucide.createIcons();</script>
</body>
</html>

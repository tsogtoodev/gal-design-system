<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Neutrals (dark)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-stage);
    background-image: var(--stage-pattern);
    padding: 24px;
    min-height: 100vh;
    box-sizing: border-box;
  }
  .card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 20px 22px;
    box-shadow: var(--elev-1);
  }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); }
  .swatch { width: 64px; height: 64px; border-radius: 10px; border: 1px solid var(--border); }
  .swatch.sm { width: 40px; height: 40px; border-radius: 8px; }
  .name { font-size: 13px; font-weight: 500; color: var(--fg-1); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.04em; }
</style>
</head>
<body>
<div class="card" style="background:#141416; border-color: rgba(255,255,255,0.08);">
  <div style="font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #6B6B72; margin-bottom:14px;">Neutrals · dark mode</div>
  <div style="display:grid; grid-template-columns: repeat(8, 1fr); gap: 10px;">
    
    <div class="col" style="gap:6px;">
      <div style="background:#0B0B0C; width:100%; height:60px; border-radius:8px; border:1px solid rgba(255,255,255,0.08);"></div>
      <div style="font-size:11px; font-weight:500; color:#FAFAFA;">stage</div>
      <div style="font-family: var(--font-mono); font-size:10px; color:#6B6B72;">#0B0B0C</div>
    </div>
    <div class="col" style="gap:6px;">
      <div style="background:#141416; width:100%; height:60px; border-radius:8px; border:1px solid rgba(255,255,255,0.08);"></div>
      <div style="font-size:11px; font-weight:500; color:#FAFAFA;">surface</div>
      <div style="font-family: var(--font-mono); font-size:10px; color:#6B6B72;">#141416</div>
    </div>
    <div class="col" style="gap:6px;">
      <div style="background:#1A1A1D; width:100%; height:60px; border-radius:8px; border:1px solid rgba(255,255,255,0.08);"></div>
      <div style="font-size:11px; font-weight:500; color:#FAFAFA;">surface 2</div>
      <div style="font-family: var(--font-mono); font-size:10px; color:#6B6B72;">#1A1A1D</div>
    </div>
    <div class="col" style="gap:6px;">
      <div style="background:#222227; width:100%; height:60px; border-radius:8px; border:1px solid rgba(255,255,255,0.08);"></div>
      <div style="font-size:11px; font-weight:500; color:#FAFAFA;">surface 3</div>
      <div style="font-family: var(--font-mono); font-size:10px; color:#6B6B72;">#222227</div>
    </div>
    <div class="col" style="gap:6px;">
      <div style="background:#3A3A40; width:100%; height:60px; border-radius:8px; border:1px solid rgba(255,255,255,0.08);"></div>
      <div style="font-size:11px; font-weight:500; color:#FAFAFA;">fg 4</div>
      <div style="font-family: var(--font-mono); font-size:10px; color:#6B6B72;">#3A3A40</div>
    </div>
    <div class="col" style="gap:6px;">
      <div style="background:#6B6B72; width:100%; height:60px; border-radius:8px; border:1px solid rgba(255,255,255,0.08);"></div>
      <div style="font-size:11px; font-weight:500; color:#FAFAFA;">fg 3</div>
      <div style="font-family: var(--font-mono); font-size:10px; color:#6B6B72;">#6B6B72</div>
    </div>
    <div class="col" style="gap:6px;">
      <div style="background:#A6A6AD; width:100%; height:60px; border-radius:8px; border:1px solid rgba(255,255,255,0.08);"></div>
      <div style="font-size:11px; font-weight:500; color:#FAFAFA;">fg 2</div>
      <div style="font-family: var(--font-mono); font-size:10px; color:#6B6B72;">#A6A6AD</div>
    </div>
    <div class="col" style="gap:6px;">
      <div style="background:#FAFAFA; width:100%; height:60px; border-radius:8px; border:1px solid rgba(255,255,255,0.08);"></div>
      <div style="font-size:11px; font-weight:500; color:#FAFAFA;">fg 1</div>
      <div style="font-family: var(--font-mono); font-size:10px; color:#6B6B72;">#FAFAFA</div>
    </div>
  </div>
</div>
</body>
</html>

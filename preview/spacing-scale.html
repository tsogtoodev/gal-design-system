<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-stage); background-image: var(--stage-pattern); padding: 24px; min-height: 100vh; box-sizing: border-box; }
  .card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 20px 22px; box-shadow: var(--elev-1); }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.04em; }
</style>
</head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:14px;">Spacing · 4pt scale</div>
  <div style="display:flex; align-items:flex-end; gap:14px;">
    
      <div class="col" style="gap:6px; align-items:center;">
        <div style="background:var(--accent); width:2px; height:2px; border-radius:3px;"></div>
        <div class="meta" style="text-transform:none;">2</div>
        <div class="name" style="font-size:10px; color:var(--fg-3);">s-1</div>
      </div>
      <div class="col" style="gap:6px; align-items:center;">
        <div style="background:var(--accent); width:4px; height:4px; border-radius:3px;"></div>
        <div class="meta" style="text-transform:none;">4</div>
        <div class="name" style="font-size:10px; color:var(--fg-3);">s-2</div>
      </div>
      <div class="col" style="gap:6px; align-items:center;">
        <div style="background:var(--accent); width:8px; height:8px; border-radius:3px;"></div>
        <div class="meta" style="text-transform:none;">8</div>
        <div class="name" style="font-size:10px; color:var(--fg-3);">s-3</div>
      </div>
      <div class="col" style="gap:6px; align-items:center;">
        <div style="background:var(--accent); width:12px; height:12px; border-radius:3px;"></div>
        <div class="meta" style="text-transform:none;">12</div>
        <div class="name" style="font-size:10px; color:var(--fg-3);">s-4</div>
      </div>
      <div class="col" style="gap:6px; align-items:center;">
        <div style="background:var(--accent); width:16px; height:16px; border-radius:3px;"></div>
        <div class="meta" style="text-transform:none;">16</div>
        <div class="name" style="font-size:10px; color:var(--fg-3);">s-5</div>
      </div>
      <div class="col" style="gap:6px; align-items:center;">
        <div style="background:var(--accent); width:20px; height:20px; border-radius:3px;"></div>
        <div class="meta" style="text-transform:none;">20</div>
        <div class="name" style="font-size:10px; color:var(--fg-3);">s-6</div>
      </div>
      <div class="col" style="gap:6px; align-items:center;">
        <div style="background:var(--accent); width:24px; height:24px; border-radius:3px;"></div>
        <div class="meta" style="text-transform:none;">24</div>
        <div class="name" style="font-size:10px; color:var(--fg-3);">s-7</div>
      </div>
      <div class="col" style="gap:6px; align-items:center;">
        <div style="background:var(--accent); width:32px; height:32px; border-radius:3px;"></div>
        <div class="meta" style="text-transform:none;">32</div>
        <div class="name" style="font-size:10px; color:var(--fg-3);">s-8</div>
      </div>
      <div class="col" style="gap:6px; align-items:center;">
        <div style="background:var(--accent); width:40px; height:40px; border-radius:3px;"></div>
        <div class="meta" style="text-transform:none;">40</div>
        <div class="name" style="font-size:10px; color:var(--fg-3);">s-9</div>
      </div>
      <div class="col" style="gap:6px; align-items:center;">
        <div style="background:var(--accent); width:56px; height:56px; border-radius:3px;"></div>
        <div class="meta" style="text-transform:none;">56</div>
        <div class="name" style="font-size:10px; color:var(--fg-3);">s-10</div>
      </div>
      <div class="col" style="gap:6px; align-items:center;">
        <div style="background:var(--accent); width:80px; height:80px; border-radius:3px;"></div>
        <div class="meta" style="text-transform:none;">80</div>
        <div class="name" style="font-size:10px; color:var(--fg-3);">s-11</div>
      </div>
  </div>
</div>
</body>
</html>

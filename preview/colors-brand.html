<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand accent</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-stage);
    background-image: var(--stage-pattern);
    padding: 24px;
    min-height: 100vh;
    box-sizing: border-box;
  }
  .card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 20px 22px;
    box-shadow: var(--elev-1);
  }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); }
  .swatch { width: 64px; height: 64px; border-radius: 10px; border: 1px solid var(--border); }
  .swatch.sm { width: 40px; height: 40px; border-radius: 8px; }
  .name { font-size: 13px; font-weight: 500; color: var(--fg-1); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.04em; }
</style>
</head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:14px;">Brand accent · orange</div>
  <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap: 12px;">
    
    <div class="col" style="gap:6px;">
      <div class="swatch" style="background:#FEEBE0; width:100%; height:72px;"></div>
      <div class="name">soft</div>
      <div class="meta">#FEEBE0</div>
    </div>
    <div class="col" style="gap:6px;">
      <div class="swatch" style="background:#FCD6C0; width:100%; height:72px;"></div>
      <div class="name">soft 2</div>
      <div class="meta">#FCD6C0</div>
    </div>
    <div class="col" style="gap:6px;">
      <div class="swatch" style="background:#F5642B; width:100%; height:72px;"></div>
      <div class="name">base</div>
      <div class="meta">#F5642B</div>
    </div>
    <div class="col" style="gap:6px;">
      <div class="swatch" style="background:#E55321; width:100%; height:72px;"></div>
      <div class="name">hover</div>
      <div class="meta">#E55321</div>
    </div>
    <div class="col" style="gap:6px;">
      <div class="swatch" style="background:#C84715; width:100%; height:72px;"></div>
      <div class="name">press</div>
      <div class="meta">#C84715</div>
    </div>
  </div>
</div>
</body>
</html>

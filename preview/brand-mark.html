<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand mark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&display=swap">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-stage); background-image: var(--stage-pattern); padding: 24px; min-height: 100vh; box-sizing: border-box; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 22px 24px; box-shadow: var(--elev-1); display:flex; align-items:center; gap:18px; }
  .card.dark { background:#0B0B0C; border-color: rgba(255,255,255,0.08); }
  .label { font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); }
  .label.dark { color: #6B6B72; }
  .col { display:flex; flex-direction:column; gap:8px; }
  .mark { width: 44px; height: 64px; object-fit: contain; flex-shrink: 0; }

  /* === Wordmark === */
  .wordmark {
    font-family: 'Bricolage Grotesque', var(--font-sans);
    font-weight: 700;
    font-size: 36px;
    line-height: 0.9;
    letter-spacing: -0.04em;
    font-feature-settings: "ss01" on, "cv01" on;
  }
  .wordmark.light { color: var(--fg-1); }
  .wordmark.dark  { color: #FAFAFA; }
</style>
</head>
<body>
<div class="grid">

  <!-- Light -->
  <div class="card">
    <img class="mark" src="../assets/logo.png" alt="Gal mark">
    <div class="col">
      <div class="wordmark light">Gal</div>
      <div class="label">Primary mark · light</div>
    </div>
  </div>

  <!-- Dark -->
  <div class="card dark">
    <img class="mark" src="../assets/logo.png" alt="Gal mark">
    <div class="col">
      <div class="wordmark dark">Gal</div>
      <div class="label dark">Primary mark · dark</div>
    </div>
  </div>

</div>
</body>
</html>

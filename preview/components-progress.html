<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Progress</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-stage); background-image: var(--stage-pattern); padding: 24px; min-height: 100vh; box-sizing: border-box; }
  .card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 20px 22px; box-shadow: var(--elev-1); }
  .label { font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.04em; }
  .row { display:flex; align-items:center; gap:10px; }
</style>
</head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:14px;">Progress</div>
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div style="display:flex; align-items:center; gap:14px;">
      <i data-lucide="chevron-up" style="width:16px; height:16px; color:var(--fg-2);"></i>
      <div style="font:600 14px/1 var(--font-sans);">Getting started</div>
      <div style="flex:1; display:flex; gap:2px; height:14px; align-items:center; justify-content:flex-end; max-width:200px; margin-left:auto;">
        <div style="width:3px; height:14px; background:#16A34A; border-radius:2px;"></div><div style="width:3px; height:14px; background:#16A34A; border-radius:2px;"></div><div style="width:3px; height:14px; background:#16A34A; border-radius:2px;"></div><div style="width:3px; height:14px; background:#16A34A; border-radius:2px;"></div><div style="width:3px; height:14px; background:#16A34A; border-radius:2px;"></div><div style="width:3px; height:14px; background:#16A34A; border-radius:2px;"></div><div style="width:3px; height:14px; background:#16A34A; border-radius:2px;"></div><div style="width:3px; height:14px; background:#16A34A; border-radius:2px;"></div><div style="width:3px; height:14px; background:var(--bg-surface-3); border-radius:2px;"></div><div style="width:3px; height:14px; background:var(--bg-surface-3); border-radius:2px;"></div><div style="width:3px; height:14px; background:var(--bg-surface-3); border-radius:2px;"></div><div style="width:3px; height:14px; background:var(--bg-surface-3); border-radius:2px;"></div><div style="width:3px; height:14px; background:var(--bg-surface-3); border-radius:2px;"></div><div style="width:3px; height:14px; background:var(--bg-surface-3); border-radius:2px;"></div><div style="width:3px; height:14px; background:var(--bg-surface-3); border-radius:2px;"></div><div style="width:3px; height:14px; background:var(--bg-surface-3); border-radius:2px;"></div><div style="width:3px; height:14px; background:var(--bg-surface-3); border-radius:2px;"></div><div style="width:3px; height:14px; background:var(--bg-surface-3); border-radius:2px;"></div><div style="width:3px; height:14px; background:var(--bg-surface-3); border-radius:2px;"></div><div style="width:3px; height:14px; background:var(--bg-surface-3); border-radius:2px;"></div>
      </div>
      <div style="font-family:var(--font-mono); font-size:13px; font-weight:500; color:var(--fg-1); font-variant-numeric:tabular-nums;">2/5</div>
    </div>
    <div style="height:6px; background:var(--bg-surface-3); border-radius:999px; overflow:hidden;">
      <div style="width:40%; height:100%; background:var(--accent);"></div>
    </div>
  </div>
</div>

<script>lucide && lucide.createIcons && lucide.createIcons();</script>
</body>
</html>

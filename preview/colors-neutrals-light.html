<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Neutrals (light)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-stage);
    background-image: var(--stage-pattern);
    padding: 24px;
    min-height: 100vh;
    box-sizing: border-box;
  }
  .card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 20px 22px;
    box-shadow: var(--elev-1);
  }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); }
  .swatch { width: 64px; height: 64px; border-radius: 10px; border: 1px solid var(--border); }
  .swatch.sm { width: 40px; height: 40px; border-radius: 8px; }
  .name { font-size: 13px; font-weight: 500; color: var(--fg-1); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.04em; }
</style>
</head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:14px;">Neutrals · light mode</div>
  <div style="display:grid; grid-template-columns: repeat(8, 1fr); gap: 10px;">
    
    <div class="col" style="gap:6px;">
      <div style="background:#FFFFFF; width:100%; height:60px; border-radius:8px; border:1px solid var(--border);"></div>
      <div class="name" style="font-size:11px;">bg surface</div>
      <div class="meta" style="font-size:10px;">#FFFFFF</div>
    </div>
    <div class="col" style="gap:6px;">
      <div style="background:#F7F7F7; width:100%; height:60px; border-radius:8px; border:1px solid var(--border);"></div>
      <div class="name" style="font-size:11px;">surface 2</div>
      <div class="meta" style="font-size:10px;">#F7F7F7</div>
    </div>
    <div class="col" style="gap:6px;">
      <div style="background:#F4F4F4; width:100%; height:60px; border-radius:8px; border:1px solid var(--border);"></div>
      <div class="name" style="font-size:11px;">stage</div>
      <div class="meta" style="font-size:10px;">#F4F4F4</div>
    </div>
    <div class="col" style="gap:6px;">
      <div style="background:#EEEEEF; width:100%; height:60px; border-radius:8px; border:1px solid var(--border);"></div>
      <div class="name" style="font-size:11px;">surface 3</div>
      <div class="meta" style="font-size:10px;">#EEEEEF</div>
    </div>
    <div class="col" style="gap:6px;">
      <div style="background:#C8C8CD; width:100%; height:60px; border-radius:8px; border:1px solid var(--border);"></div>
      <div class="name" style="font-size:11px;">fg 4</div>
      <div class="meta" style="font-size:10px;">#C8C8CD</div>
    </div>
    <div class="col" style="gap:6px;">
      <div style="background:#9A9AA1; width:100%; height:60px; border-radius:8px; border:1px solid var(--border);"></div>
      <div class="name" style="font-size:11px;">fg 3</div>
      <div class="meta" style="font-size:10px;">#9A9AA1</div>
    </div>
    <div class="col" style="gap:6px;">
      <div style="background:#5A5A60; width:100%; height:60px; border-radius:8px; border:1px solid var(--border);"></div>
      <div class="name" style="font-size:11px;">fg 2</div>
      <div class="meta" style="font-size:10px;">#5A5A60</div>
    </div>
    <div class="col" style="gap:6px;">
      <div style="background:#0F0F10; width:100%; height:60px; border-radius:8px; border:1px solid var(--border);"></div>
      <div class="name" style="font-size:11px;">fg 1</div>
      <div class="meta" style="font-size:10px;">#0F0F10</div>
    </div>
  </div>
</div>
</body>
</html>

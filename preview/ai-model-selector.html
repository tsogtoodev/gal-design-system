<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html,body{margin:0;padding:0}
  body{background:var(--bg-stage);background-image:var(--stage-pattern);padding:20px;min-height:100vh;box-sizing:border-box}
  .frame{background:var(--bg-surface-2);border:1px solid var(--border);border-radius:16px;box-shadow:var(--elev-1);padding:6px;display:flex;flex-direction:column;gap:6px;}
  .fh{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 4px;gap:10px;}
  .fh .t{font:600 14px/1.2 var(--font-sans);color:var(--fg-1);}
  .ibtn{width:24px;height:24px;border:0;background:transparent;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--fg-2);transition:background 140ms,color 140ms;}
  .ibtn:hover{background:rgba(15,15,15,0.05);color:var(--fg-1);}
  .ibtn svg{width:14px;height:14px;}
  .sub{background:var(--bg-surface);border:1px solid var(--border);border-radius:12px;padding:14px;}
  .ml{font-family:var(--font-mono);font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--fg-3);}
  .ff{display:flex;align-items:center;gap:10px;padding:8px 10px 8px;}
  .ff .meta{font-family:var(--font-mono);font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--fg-3);white-space:nowrap;}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:999px;font:500 12px/1 var(--font-sans);cursor:pointer;border:1px solid transparent;transition:background 140ms;white-space:nowrap;}
  .btn-outline{background:var(--bg-surface);color:var(--fg-1);border-color:var(--border-strong);}
  .btn-outline:hover{background:var(--bg-surface-2);}
  .btn-primary{background:var(--accent);color:white;}
  .btn-primary:hover{background:var(--accent-hover);}
  .btn-ghost{background:transparent;color:var(--fg-2);}
  .btn svg{width:12px;height:12px;flex-shrink:0;}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-family:var(--font-mono);font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;white-space:nowrap;}
  .pill::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}
  .pill.success{background:var(--success-soft);color:var(--success);}
  .pill.info{background:var(--info-soft);color:var(--info);}
  .pill.warn{background:var(--warning-soft);color:var(--warning);}
  .pill.danger{background:var(--danger-soft);color:var(--danger);}
  .pill.neutral{background:var(--bg-surface-2);color:var(--fg-2);border:1px solid var(--border);}
  .pill.neutral::before{display:none;}
</style>
</head>
<body>
<div class="frame">
  <div class="fh"><span class="t">ModelSelector</span><span class="ml" style="margin-left:auto;">searchable picker</span></div>
  <div class="sub" style="padding:0;overflow:hidden;">
    <div style="display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);">
      <i data-lucide="search" style="width:14px;height:14px;color:var(--fg-3);"></i>
      <input style="flex:1;border:0;outline:0;background:transparent;font:400 13px var(--font-sans);box-shadow:none;" value="claude" placeholder="Search models…">
      <span class="ml">8 RESULTS</span>
    </div>
    <div style="padding:6px;display:flex;flex-direction:column;gap:1px;max-height:300px;overflow-y:auto;">
      <div class="ml" style="padding:6px 8px;">Anthropic</div>
      <div class="mrow selected">
        <span class="dot" style="background:#F5642B;"></span>
        <div class="info"><div class="name"><b>Cla</b>ude 4.5 Sonnet</div><div class="desc">200K context · best balance</div></div>
        <i data-lucide="check" style="width:14px;height:14px;color:var(--accent);"></i>
      </div>
      <div class="mrow">
        <span class="dot" style="background:#F5642B;"></span>
        <div class="info"><div class="name"><b>Cla</b>ude 4 Opus</div><div class="desc">Heaviest reasoning · slower</div></div>
      </div>
      <div class="mrow">
        <span class="dot" style="background:#F5642B;"></span>
        <div class="info"><div class="name"><b>Cla</b>ude 4 Haiku</div><div class="desc">Fast · cheap</div></div>
      </div>
      <div class="ml" style="padding:8px 8px 4px;">OpenAI</div>
      <div class="mrow">
        <span class="dot" style="background:#10A37F;"></span>
        <div class="info"><div class="name">GPT-5</div><div class="desc">128K context · reasoning</div></div>
        <span class="pill warn" style="margin-left:auto;">SLOW</span>
      </div>
      <div class="mrow">
        <span class="dot" style="background:#10A37F;"></span>
        <div class="info"><div class="name">GPT-5 mini</div><div class="desc">Lighter, faster</div></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:14px;padding:10px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--fg-3);">
      <span><span class="kbd">↑↓</span> Navigate</span>
      <span><span class="kbd">↵</span> Select</span>
      <span style="margin-left:auto;"><span class="kbd">ESC</span> Close</span>
    </div>
  </div>
  <div class="ff"><span class="meta">⌘M TO OPEN</span></div>
</div>
<style>
  .mrow{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer;transition:background 100ms;}
  .mrow:hover, .mrow.selected{background:var(--bg-surface-2);}
  .mrow .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .mrow .info{flex:1;min-width:0;}
  .mrow .name{font-size:13px;color:var(--fg-1);}
  .mrow .name b{color:var(--accent);background:var(--accent-soft);padding:0 2px;border-radius:2px;}
  .mrow .desc{font-size:11px;color:var(--fg-2);margin-top:1px;}
  .kbd{font-family:var(--font-mono);font-size:10px;padding:2px 5px;background:var(--bg-surface-2);border:1px solid var(--border);border-radius:4px;color:var(--fg-3);}
</style>
<script>if(window.lucide)lucide.createIcons();</script></body></html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type · Mono labels</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-stage); background-image: var(--stage-pattern); padding: 24px; min-height: 100vh; box-sizing: border-box; }
  .card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 20px 22px; box-shadow: var(--elev-1); }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.04em; }
</style>
</head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:14px;">Signature mono labels · Geist Mono</div>
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div style="display:flex; align-items:baseline; gap:18px;">
      <div style="font-family: var(--font-mono); font-size:11px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color: var(--fg-3);">WORKFLOWS / NEW USER MARKETING SIGNUP</div>
      <div class="meta" style="margin-left:auto;">mono-label · 11 / 500 / +0.12em</div>
    </div>
    <div style="display:flex; align-items:baseline; gap:18px;">
      <div style="font-family: var(--font-mono); font-size:11px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color: var(--fg-3);">LATEST FEEDBACK:</div>
      <div class="meta" style="margin-left:auto;">section divider</div>
    </div>
    <div style="display:flex; align-items:baseline; gap:18px;">
      <div style="display:inline-flex; padding:4px 10px; border-radius:999px; background: var(--success-soft); color: var(--success); font-family: var(--font-mono); font-size:11px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase;">ACTIVE</div>
      <div style="display:inline-flex; padding:4px 10px; border-radius:999px; background: var(--bg-surface-2); color: var(--fg-2); font-family: var(--font-mono); font-size:11px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase;">CLICKUP</div>
      <div class="meta" style="margin-left:auto;">status pill</div>
    </div>
    <div style="display:flex; align-items:baseline; gap:18px;">
      <div style="font-family: var(--font-mono); font-size:13px; font-weight:500; color: var(--fg-1);">04-01-2026, 09:12</div>
      <div class="meta" style="margin-left:auto;">mono-data · 13 / 500</div>
    </div>
  </div>
</div>
</body>
</html>

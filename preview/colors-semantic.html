<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Semantic colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-stage);
    background-image: var(--stage-pattern);
    padding: 24px;
    min-height: 100vh;
    box-sizing: border-box;
  }
  .card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 20px 22px;
    box-shadow: var(--elev-1);
  }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); }
  .swatch { width: 64px; height: 64px; border-radius: 10px; border: 1px solid var(--border); }
  .swatch.sm { width: 40px; height: 40px; border-radius: 8px; }
  .name { font-size: 13px; font-weight: 500; color: var(--fg-1); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.04em; }
</style>
</head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:14px;">Semantic · status</div>
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 14px;">
    
    <div class="col" style="gap:8px;">
      <div style="display:flex; gap:6px;">
        <div style="background:#16A34A; width:32px; height:32px; border-radius:8px;"></div>
        <div style="background:#DCFCE7; width:32px; height:32px; border-radius:8px; border:1px solid var(--border);"></div>
      </div>
      <div class="name">Success</div>
      <div class="meta" style="text-transform:none; letter-spacing:0;">Ready · Active · +4.8%</div>
    </div>
    <div class="col" style="gap:8px;">
      <div style="display:flex; gap:6px;">
        <div style="background:#DC2626; width:32px; height:32px; border-radius:8px;"></div>
        <div style="background:#FEE2E2; width:32px; height:32px; border-radius:8px; border:1px solid var(--border);"></div>
      </div>
      <div class="name">Danger</div>
      <div class="meta" style="text-transform:none; letter-spacing:0;">Error · −2.5 · 1 ERROR</div>
    </div>
    <div class="col" style="gap:8px;">
      <div style="display:flex; gap:6px;">
        <div style="background:#D97706; width:32px; height:32px; border-radius:8px;"></div>
        <div style="background:#FEF3C7; width:32px; height:32px; border-radius:8px; border:1px solid var(--border);"></div>
      </div>
      <div class="name">Warning</div>
      <div class="meta" style="text-transform:none; letter-spacing:0;">3 warnings · caution</div>
    </div>
    <div class="col" style="gap:8px;">
      <div style="display:flex; gap:6px;">
        <div style="background:#2563EB; width:32px; height:32px; border-radius:8px;"></div>
        <div style="background:#DBEAFE; width:32px; height:32px; border-radius:8px; border:1px solid var(--border);"></div>
      </div>
      <div class="name">Info</div>
      <div class="meta" style="text-transform:none; letter-spacing:0;">Notice · tooltip</div>
    </div>
  </div>
</div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><title>Combobox</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html,body{margin:0;padding:0}
  body{background:var(--bg-stage);background-image:var(--stage-pattern);padding:24px;min-height:100vh;box-sizing:border-box}
  .card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 20px;box-shadow:var(--elev-1)}
  .label{font-family:var(--font-mono);font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--fg-3)}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;font:500 13px/1 var(--font-sans);cursor:pointer;border:1px solid transparent;transition:background 180ms cubic-bezier(.2,.7,.2,1);}
  .btn-outline{background:var(--bg-surface);color:var(--fg-1);border-color:var(--border-strong);}
  .btn-outline:hover{background:var(--bg-surface-2);}
  .btn-primary{background:var(--accent);color:white;}
  .btn-primary:hover{background:var(--accent-hover);}
  .btn-ghost{background:transparent;color:var(--fg-2);}
  .btn-ghost:hover{background:var(--bg-surface-2);color:var(--fg-1);}
</style>
</head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:10px;">Combobox · click and type</div>
  <div class="cb-wrap" id="cb">
    <div class="cb-trigger" id="cb-trigger">
      <span class="dot" style="width:8px;height:8px;background:#F5642B;border-radius:50%;flex-shrink:0;"></span>
      <span class="cb-value" id="cb-value">Claude</span>
      <i data-lucide="chevron-down" style="margin-left:auto;width:14px;height:14px;color:var(--fg-3);"></i>
    </div>
    <div class="cb-pop" id="cb-pop">
      <div class="cb-search">
        <i data-lucide="search" style="width:14px;height:14px;color:var(--fg-3);"></i>
        <input id="cb-input" placeholder="Search…" autocomplete="off">
      </div>
      <div class="cb-list" id="cb-list"></div>
      <div class="cb-empty" id="cb-empty" style="display:none;">No model found.</div>
    </div>
  </div>
  <div class="label" style="margin-top:18px;">Selected: <span style="color:var(--fg-1);text-transform:none;letter-spacing:0;font-family:var(--font-sans);" id="cb-readout">Claude</span></div>
</div>

<style>
  .cb-wrap{position:relative;width:320px;}
  .cb-trigger{display:flex;align-items:center;gap:10px;height:40px;padding:0 12px;border:1px solid var(--border-strong);border-radius:10px;background:var(--bg-surface);cursor:pointer;transition:border-color 140ms,box-shadow 140ms,background 140ms;font-size:14px;color:var(--fg-1);}
  .cb-trigger:hover{background:var(--bg-surface-2);}
  .cb-wrap.open .cb-trigger{border-color:var(--accent);box-shadow:var(--elev-focus);background:var(--bg-surface);}
  .cb-pop{position:absolute;top:46px;left:0;right:0;background:var(--bg-surface);border:1px solid var(--border);border-radius:10px;box-shadow:var(--elev-2);padding:6px;opacity:0;transform:translateY(-4px) scale(0.98);transform-origin:top center;pointer-events:none;transition:opacity 200ms cubic-bezier(.2,.7,.2,1),transform 240ms cubic-bezier(.2,.7,.2,1);z-index:10;}
  .cb-wrap.open .cb-pop{opacity:1;transform:none;pointer-events:auto;}
  .cb-search{display:flex;align-items:center;gap:8px;padding:6px 8px;border-bottom:1px solid var(--border);}
  .cb-search input{flex:1;border:0;outline:0;font:400 13px/1 var(--font-sans);background:transparent;color:var(--fg-1);box-shadow:none;}
  .cb-search input:focus, .cb-search input:focus-visible{outline:0;box-shadow:none;border:0;}
  .cb-list{max-height:240px;overflow-y:auto;padding:6px 0;}
  .cb-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:6px;font-size:13px;color:var(--fg-1);cursor:pointer;transition:background 100ms;}
  .cb-item:hover, .cb-item.hl{background:var(--bg-surface-2);}
  .cb-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .cb-item svg{width:14px;height:14px;color:var(--accent);margin-left:auto;opacity:0;transition:opacity 140ms;}
  .cb-item.selected svg{opacity:1;}
  .cb-empty{padding:24px 12px;text-align:center;font-size:13px;color:var(--fg-3);}
  .cb-item mark{background:var(--accent-soft);color:var(--accent);padding:0 1px;border-radius:2px;font-weight:600;}
</style>
<script>
  const MODELS = [
    { name: 'Claude',    dot: '#F5642B' },
    { name: 'ChatGPT',   dot: '#0F0F10' },
    { name: 'Gemini',    dot: '#2563EB' },
    { name: 'Perplexity',dot: '#0F766E' },
    { name: 'Grok',      dot: '#404045' },
    { name: 'Llama',     dot: '#8B5CF6' },
    { name: 'Mistral',   dot: '#F43F5E' },
    { name: 'Cohere',    dot: '#14B8A6' },
  ];
  let selected = 'Claude';
  let hl = 0;
  const wrap = document.getElementById('cb');
  const input = document.getElementById('cb-input');
  const list = document.getElementById('cb-list');
  const empty = document.getElementById('cb-empty');
  let filtered = MODELS.slice();

  function escapeHtml(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
  function hi(label, q){if(!q)return escapeHtml(label);const i=label.toLowerCase().indexOf(q.toLowerCase());if(i<0)return escapeHtml(label);return escapeHtml(label.slice(0,i))+'<mark>'+escapeHtml(label.slice(i,i+q.length))+'</mark>'+escapeHtml(label.slice(i+q.length));}

  function render() {
    const q = input.value.trim();
    filtered = MODELS.filter(m => m.name.toLowerCase().includes(q.toLowerCase()));
    if (!filtered.length) { list.innerHTML = ''; empty.style.display='block'; return; }
    empty.style.display='none';
    list.innerHTML = filtered.map(function(m, i){
      return '<div class="cb-item ' + (i===hl?'hl':'') + ' ' + (m.name===selected?'selected':'') + '" data-name="' + m.name + '">' +
        '<span class="dot" style="background:' + m.dot + ';"></span>' +
        '<span>' + hi(m.name, q) + '</span>' +
        '<i data-lucide="check"></i>' +
        '</div>';
    }).join('');
    lucide.createIcons();
    list.querySelectorAll('.cb-item').forEach(function(it, i){
      it.addEventListener('mouseenter', () => { hl = i; render(); });
      it.addEventListener('click', () => pick(it.dataset.name));
    });
  }
  function pick(name) {
    selected = name;
    const m = MODELS.find(x => x.name === name);
    document.getElementById('cb-value').textContent = name;
    document.querySelector('.cb-trigger > .dot').style.background = m.dot;
    document.getElementById('cb-readout').textContent = name;
    close();
  }
  function open() { wrap.classList.add('open'); setTimeout(() => input.focus(), 100); render(); }
  function close() { wrap.classList.remove('open'); input.value=''; hl=0; }
  document.getElementById('cb-trigger').addEventListener('click', e => { e.stopPropagation(); wrap.classList.contains('open') ? close() : open(); });
  document.addEventListener('click', e => { if (wrap.classList.contains('open') && !wrap.contains(e.target)) close(); });
  input.addEventListener('input', () => { hl=0; render(); });
  input.addEventListener('keydown', e => {
    if (e.key==='ArrowDown'){e.preventDefault();hl=Math.min(filtered.length-1,hl+1);render();}
    if (e.key==='ArrowUp'){e.preventDefault();hl=Math.max(0,hl-1);render();}
    if (e.key==='Enter'){if (filtered[hl]) pick(filtered[hl].name);}
    if (e.key==='Escape'){close();}
  });
</script>

<script>if (window.lucide) lucide.createIcons();</script>
</body></html>

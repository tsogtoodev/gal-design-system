<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><title>OTP input</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html,body{margin:0;padding:0}
  body{background:var(--bg-stage);background-image:var(--stage-pattern);padding:24px;min-height:100vh;box-sizing:border-box}
  .card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 20px;box-shadow:var(--elev-1)}
  .label{font-family:var(--font-mono);font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--fg-3)}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;font:500 13px/1 var(--font-sans);cursor:pointer;border:1px solid transparent;transition:background 180ms cubic-bezier(.2,.7,.2,1);}
  .btn-outline{background:var(--bg-surface);color:var(--fg-1);border-color:var(--border-strong);}
  .btn-outline:hover{background:var(--bg-surface-2);}
  .btn-primary{background:var(--accent);color:white;}
  .btn-primary:hover{background:var(--accent-hover);}
  .btn-ghost{background:transparent;color:var(--fg-2);}
  .btn-ghost:hover{background:var(--bg-surface-2);color:var(--fg-1);}
</style>
</head>
<body>
<div class="card">
  <div class="label" style="margin-bottom:8px;">One-time code · try typing 123456</div>
  <div style="font-size:13px;color:var(--fg-2);margin-bottom:14px;">Enter the 6-digit code we sent to ··@gmail.com</div>
  <div class="otp" id="otp">
    <input type="text" inputmode="numeric" maxlength="1" />
    <input type="text" inputmode="numeric" maxlength="1" />
    <input type="text" inputmode="numeric" maxlength="1" />
    <input type="text" inputmode="numeric" maxlength="1" />
    <input type="text" inputmode="numeric" maxlength="1" />
    <input type="text" inputmode="numeric" maxlength="1" />
  </div>
  <div class="label" style="margin-top:14px;" id="otp-status">Waiting for code…</div>
</div>

<style>
  .otp{display:flex;gap:8px;}
  .otp input{width:44px;height:52px;border:1.5px solid var(--border-strong);border-radius:10px;background:var(--bg-surface);font:500 18px/1 var(--font-mono);color:var(--fg-1);text-align:center;outline:0;transition:border-color 140ms,box-shadow 140ms,background 140ms;}
  .otp input:focus{border-color:var(--accent);box-shadow:var(--elev-focus);}
  .otp input.filled{background:var(--bg-surface-2);}
  .otp input.error{border-color:var(--danger);box-shadow:0 0 0 3px rgba(220,38,38,0.18);animation:shake 0.35s;}
  .otp input.success{border-color:var(--success);}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}
</style>
<script>
  const inputs = [].slice.call(document.querySelectorAll('.otp input'));
  const status = document.getElementById('otp-status');
  inputs.forEach((inp, i) => {
    inp.addEventListener('input', e => {
      const v = e.target.value.replace(/[^0-9]/g,'');
      e.target.value = v;
      inp.classList.toggle('filled', v.length > 0);
      if (v && i < inputs.length - 1) inputs[i+1].focus();
      checkComplete();
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !inp.value && i > 0) inputs[i-1].focus();
      if (e.key === 'ArrowLeft' && i > 0) inputs[i-1].focus();
      if (e.key === 'ArrowRight' && i < inputs.length - 1) inputs[i+1].focus();
    });
    inp.addEventListener('paste', e => {
      const txt = (e.clipboardData.getData('text') || '').replace(/[^0-9]/g,'').slice(0,6);
      if (!txt) return;
      e.preventDefault();
      txt.split('').forEach((ch, j) => { if (inputs[j]) { inputs[j].value = ch; inputs[j].classList.add('filled'); }});
      (inputs[txt.length] || inputs[inputs.length-1]).focus();
      checkComplete();
    });
  });
  function checkComplete() {
    const code = inputs.map(i => i.value).join('');
    inputs.forEach(i => i.classList.remove('error','success'));
    if (code.length === 6) {
      if (code === '123456') {
        status.textContent = 'CODE VERIFIED ✓';
        status.style.color = 'var(--success)';
        inputs.forEach(i => i.classList.add('success'));
      } else {
        status.textContent = 'INVALID CODE · TRY 123456';
        status.style.color = 'var(--danger)';
        inputs.forEach(i => i.classList.add('error'));
        setTimeout(() => inputs.forEach(i => i.classList.remove('error')), 400);
      }
    } else {
      status.textContent = 'Waiting for code… (' + code.length + '/6)';
      status.style.color = '';
    }
  }
</script>

<script>if (window.lucide) lucide.createIcons();</script>
</body></html>

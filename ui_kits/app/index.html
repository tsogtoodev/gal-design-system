<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <title>Gal · UI kit</title>
  <link rel="icon" href="../../assets/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="stylesheet" href="styles.css">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    html, body { margin: 0; padding: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="primitives.jsx" data-presets="react"></script>
  <script type="text/babel" src="Sidebar.jsx" data-presets="react"></script>
  <script type="text/babel" src="screens/Dashboard.jsx" data-presets="react"></script>
  <script type="text/babel" src="screens/Workflow.jsx" data-presets="react"></script>
  <script type="text/babel" src="screens/Competitors.jsx" data-presets="react"></script>
  <script type="text/babel" src="screens/Settings.jsx" data-presets="react"></script>
  <script type="text/babel" src="app.jsx" data-presets="react"></script>

  <script>
    // Initial pass to render any inline lucide icons in the static markup
    window.addEventListener('load', () => {
      setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 100);
    });
  </script>
</body>
</html>
